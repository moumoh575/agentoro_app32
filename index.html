<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentoro Platform | WhatsApp Automation</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f7f9fc; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; max-width: 420px; border: 1px solid #e1e4e8; }
        h1 { color: #1c1e21; font-size: 26px; margin-bottom: 10px; }
        p { color: #5f6368; line-height: 1.5; margin-bottom: 30px; font-size: 15px; }
        .fb-btn { 
            background-color: #1877f2; color: white; text-decoration: none; 
            padding: 14px 28px; border-radius: 8px; font-weight: 600; display: inline-flex;
            align-items: center; justify-content: center; transition: background 0.2s; border: none; font-size: 16px;
            cursor: pointer; width: 100%;
        }
        .fb-btn:hover { background-color: #166fe5; }
        .fb-logo { width: 20px; margin-left: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div style="font-size: 50px; margin-bottom: 15px;">🤖</div>
    <h1>Agentoro AI Sales</h1>
    <p>قم بربط حساب واتساب بيزنس الخاص بك لتفعيل نظام المبيعات الذكي وأتمتة الردود فوراً.</p>
    
    <button onclick="launchWhatsAppSignup()" class="fb-btn">
        <svg class="fb-logo" viewBox="0 0 24 24" fill="white"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
        Continue with Facebook
    </button>
</div>

<script>
    window.fbAsyncInit = function() {
        FB.init({
            appId      : '4436833363269286', // App ID الخاص بك
            cookie     : true,
            xfbml      : true,
            version    : 'v25.0'
        });
    };

    function launchWhatsAppSignup() {
        FB.login(function(response) {
            if (response.authResponse) {
                const token = response.authResponse.accessToken;
                // إرسال التوكن إلى دالة auth_callback في سيرفر Flask
                window.location.href = "https://wa.agentoro.shop/auth/callback?code=" + token;
            } else {
                alert("يرجى إتمام عملية تسجيل الدخول.");
            }
        }, {
            // صلاحيات الواتساب المطلوبة للمراجعة
            scope: 'whatsapp_business_management,whatsapp_business_messaging,
            extras: {
                feature: 'whatsapp_embedded_signup',
                config_id: '958603016868973' // Config ID الخاص بك
            }
        });
    }
</script>
<script async defer crossorigin="anonymous" src="https://connect.facebook.net/en_US/sdk.js"></script>

</body>
</html>
